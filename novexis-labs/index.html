<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/novexis-logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary SEO Meta Tags -->
    <title>Novexis Labs — Premium Web Development, UI/UX Design & Digital Marketing Agency</title>
    <meta
      name="description"
      content="Novexis Labs is a premium digital agency delivering high-performance websites, stunning UI/UX designs, SEO optimization, and digital marketing solutions. Trusted by 50+ clients with a 98% satisfaction rate. Get a free consultation today."
    />
    <meta
      name="keywords"
      content="Novexis Labs, web development agency, UI UX design agency, digital marketing agency India, freelance web developers, React development, SEO services, brand strategy, custom website development, e-commerce website, web design India"
    />
    <meta name="author" content="Novexis Labs — Bhavya Mehta & Shubhamm Thakkar" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://novexislabs.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://novexislabs.com" />
    <meta property="og:title" content="Novexis Labs — Transforming Ideas Into Digital Excellence" />
    <meta
      property="og:description"
      content="Premium digital agency specializing in web development, UI/UX design, branding, and digital marketing. 50+ projects delivered. 98% client satisfaction."
    />
    <meta property="og:image" content="/novexis-logo.jpg" />
    <meta property="og:site_name" content="Novexis Labs" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Novexis Labs — Premium Web Development & Digital Marketing" />
    <meta
      name="twitter:description"
      content="We build digital solutions that drive sales, growth, and success. Web development, UI/UX, SEO & marketing."
    />
    <meta name="twitter:image" content="/novexis-logo.jpg" />

    <!-- Additional SEO Tags -->
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="msapplication-TileColor" content="#0a0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=yes" />

    <!-- Geographic SEO -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Novexis Labs",
        "url": "https://novexislabs.com",
        "logo": "/novexis-logo.jpg",
        "description": "Premium digital agency specializing in web development, UI/UX design, SEO optimization, and digital marketing. Serving businesses worldwide.",
        "email": "novexislabs07@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "founder": [
          {
            "@type": "Person",
            "name": "Shubhamm Thakkar",
            "jobTitle": "Chief Executive Officer"
          },
          {
            "@type": "Person",
            "name": "Bhavya Mehta",
            "jobTitle": "Chief Technology Officer"
          }
        ],
        "sameAs": [],
        "areaServed": "Worldwide",
        "priceRange": "₹₹",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "50"
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Digital Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Web Development",

              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "UI/UX Design",
                "description": "User-centric interface design focused on engagement and conversion"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "SEO Optimization",
                "description": "Data-driven SEO strategies to boost search rankings and organic traffic"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Digital Marketing",
                "description": "Full-funnel marketing campaigns including social media, PPC, and email"
              }
            }
          ]
        }
      }
    </script>

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"

    />
